<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Player Pong - Relly Gud College</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #333;
            background-color: #000;
        }
        .controls {
            text-align: center;
            margin-top: 20px;
        }
        .controls p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div>
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        <div class="controls">
            <p>Player: W (up) / S (down)</p>
            <p>Press Space to start/pause</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');

        // Game variables
        let ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 5,
            dy: 5,
            radius: 10
        };

        let paddle1 = {
            x: 10,
            y: canvas.height / 2 - 50,
            width: 10,
            height: 100,
            dy: 0
        };

        let paddle2 = {
            x: canvas.width - 20,
            y: canvas.height / 2 - 50,
            width: 10,
            height: 100,
            dy: 0
        };

        let score1 = 0;
        let score2 = 0;
        let gameRunning = false;

        // Draw functions
        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.closePath();
        }

        function drawPaddle(paddle) {
            ctx.fillStyle = '#fff';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
        }

        function drawScore() {
            ctx.font = '24px Arial';
            ctx.fillStyle = '#fff';
            ctx.fillText('Player: ' + score1, 50, 50);
            ctx.fillText('AI: ' + score2, canvas.width - 150, 50);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBall();
            drawPaddle(paddle1);
            drawPaddle(paddle2);
            drawScore();
        }

        // Update game state
        function update() {
            if (!gameRunning) return;

            // Move ball
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
            }

            // Ball collision with paddles
            if (ball.x - ball.radius < paddle1.x + paddle1.width &&
                ball.y > paddle1.y && ball.y < paddle1.y + paddle1.height &&
                ball.dx < 0) {
                ball.dx = -ball.dx;
            }

            if (ball.x + ball.radius > paddle2.x &&
                ball.y > paddle2.y && ball.y < paddle2.y + paddle2.height &&
                ball.dx > 0) {
                ball.dx = -ball.dx;
            }

            // Score points
            if (ball.x < 0) {
                score2++;
                resetBall();
            }

            if (ball.x > canvas.width) {
                score1++;
                resetBall();
            }

            // Move paddles
            paddle1.y += paddle1.dy;

            // AI for paddle2
            let paddle2Center = paddle2.y + paddle2.height / 2;
            if (paddle2Center < ball.y - 10) {
                paddle2.y += 4;
            } else if (paddle2Center > ball.y + 10) {
                paddle2.y -= 4;
            }

            // Keep paddles in bounds
            if (paddle1.y < 0) paddle1.y = 0;
            if (paddle1.y + paddle1.height > canvas.height) paddle1.y = canvas.height - paddle1.height;
            if (paddle2.y < 0) paddle2.y = 0;
            if (paddle2.y + paddle2.height > canvas.height) paddle2.y = canvas.height - paddle2.height;
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = -ball.dx;
            ball.dy = Math.random() > 0.5 ? 5 : -5;
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'w':
                case 'W':
                    paddle1.dy = -5;
                    break;
                case 's':
                case 'S':
                    paddle1.dy = 5;
                    break;
                case ' ':
                    gameRunning = !gameRunning;
                    e.preventDefault();
                    break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch(e.key) {
                case 'w':
                case 'W':
                case 's':
                case 'S':
                    paddle1.dy = 0;
                    break;
            }
        });

        // Start game loop
        gameLoop();
    </script>
</body>
</html>
